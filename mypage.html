<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지 - 대리입찰 톡</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/mypage.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container nav-container">
            <div class="nav-logo" onclick="window.location.href='index.html'" style="cursor: pointer;">
                <i class="fas fa-comment-dots"></i>
                <span>대리입찰 톡</span>
            </div>
            <div class="nav-actions">
                <span id="userName" style="font-weight: 600; margin-right: 1rem;"></span>
                <button class="btn btn-outline" onclick="handleLogout()">로그아웃</button>
            </div>
        </div>
    </nav>

    <div class="mypage-container">
        <aside class="mypage-sidebar">
            <div class="sidebar-profile">
                <div class="profile-avatar">
                    <i class="fas fa-user-circle"></i>
                </div>
                <h3 id="profileName">사용자</h3>
                <p id="profileEmail">user@example.com</p>
            </div>
            
            <nav class="sidebar-menu">
                <a href="#applications" class="menu-item active" onclick="showSection('applications')">
                    <i class="fas fa-file-alt"></i> 신청 내역
                </a>
                <a href="#profile" class="menu-item" onclick="showSection('profile')">
                    <i class="fas fa-user-edit"></i> 회원정보 수정
                </a>
                <a href="#payments" class="menu-item" onclick="showSection('payments')">
                    <i class="fas fa-credit-card"></i> 결제 내역
                </a>
            </nav>
        </aside>

        <main class="mypage-content">
            <!-- 신청 내역 섹션 -->
            <section id="applicationsSection" class="content-section active">
                <div class="section-header">
                    <h2><i class="fas fa-file-alt"></i> 신청 내역</h2>
                    <button class="btn btn-primary" onclick="window.location.href='index.html#application'">
                        <i class="fas fa-plus"></i> 신청하기
                    </button>
                </div>

                <div class="filter-tabs">
                    <button class="filter-tab active" onclick="filterApplications('all')">전체</button>
                    <button class="filter-tab" onclick="filterApplications('matching')">매칭중</button>
                    <button class="filter-tab" onclick="filterApplications('confirmed')">확정</button>
                    <button class="filter-tab" onclick="filterApplications('completed')">완료</button>
                </div>

                <div id="applicationsList" class="applications-list">
                    <!-- 신청 내역이 여기에 동적으로 추가됩니다 -->
                </div>
            </section>

            <!-- 회원정보 수정 섹션 -->
            <section id="profileSection" class="content-section">
                <div class="section-header">
                    <h2><i class="fas fa-user-edit"></i> 회원정보 수정</h2>
                </div>

                <div class="profile-form-container">
                    <form id="profileForm">
                        <div class="form-group">
                            <label>아이디</label>
                            <input type="text" id="profileUserId" disabled>
                        </div>
                        
                        <div class="form-group">
                            <label>이메일</label>
                            <input type="email" id="profileEmailInput" disabled>
                        </div>
                        
                        <div class="form-group">
                            <label>이름</label>
                            <input type="text" id="profileNameInput" required>
                        </div>
                        
                        <div class="form-group">
                            <label>휴대폰 번호</label>
                            <input type="tel" id="profilePhone" required>
                        </div>
                        
                        <div class="form-group">
                            <label>비밀번호 변경</label>
                            <input type="password" id="newPassword" placeholder="새 비밀번호 (변경 시에만 입력)">
                        </div>
                        
                        <div class="form-group">
                            <label>비밀번호 확인</label>
                            <input type="password" id="newPasswordConfirm" placeholder="새 비밀번호 확인">
                        </div>
                        
                        <button type="submit" class="btn btn-primary">저장하기</button>
                    </form>
                </div>
            </section>

            <!-- 결제 내역 섹션 -->
            <section id="paymentsSection" class="content-section">
                <div class="section-header">
                    <h2><i class="fas fa-credit-card"></i> 결제 내역</h2>
                </div>

                <div id="paymentsList" class="payments-list">
                    <!-- 결제 내역이 여기에 동적으로 추가됩니다 -->
                </div>
            </section>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script>
        // 로그인 체크
        if (!Auth.isLoggedIn() || Auth.getUserType() !== 'client') {
            alert('로그인이 필요합니다.');
            window.location.href = 'login.html';
        }

        // 사용자 정보 로드
        const user = Auth.getCurrentUser();
        document.getElementById('userName').textContent = user.name;
        document.getElementById('profileName').textContent = user.name;
        document.getElementById('profileEmail').textContent = user.email;
        document.getElementById('profileUserId').value = user.userId || user.email;
        document.getElementById('profileEmailInput').value = user.email;
        document.getElementById('profileNameInput').value = user.name;
        document.getElementById('profilePhone').value = user.phone || '';

        // 섹션 전환
        function showSection(section) {
            // 메뉴 활성화
            document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
            event.target.classList.add('active');
            
            // 섹션 전환
            document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
            
            if (section === 'applications') {
                document.getElementById('applicationsSection').classList.add('active');
                loadApplications();
            } else if (section === 'profile') {
                document.getElementById('profileSection').classList.add('active');
            } else if (section === 'payments') {
                document.getElementById('paymentsSection').classList.add('active');
                loadPayments();
            }
        }

        // 신청 내역 로드
        function loadApplications() {
            const listContainer = document.getElementById('applicationsList');
            
            // TODO: 실제 API에서 데이터 가져오기
            const mockData = [
                {
                    id: 1,
                    caseNumber: '2024타경12345',
                    address: '서울시 강남구 테헤란로 123',
                    appraisalPrice: 500000000,
                    bidPrice: 450000000,
                    bidDate: '2024-02-15',
                    status: 'matching',
                    statusText: '전문가 매칭중',
                    expertName: null
                },
                {
                    id: 2,
                    caseNumber: '2024타경54321',
                    address: '경기도 성남시 분당구 정자동 456',
                    appraisalPrice: 300000000,
                    bidPrice: 280000000,
                    bidDate: '2024-02-20',
                    status: 'confirmed',
                    statusText: '전문가 배정완료',
                    expertName: '김법무'
                },
                {
                    id: 3,
                    caseNumber: '2024타경99999',
                    address: '서울시 서초구 서초동 789',
                    appraisalPrice: 800000000,
                    bidPrice: 750000000,
                    bidDate: '2024-01-25',
                    status: 'completed',
                    statusText: '낙찰',
                    expertName: '이법무',
                    result: 'success'
                }
            ];

            if (mockData.length === 0) {
                listContainer.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>아직 신청 내역이 없습니다.</p></div>';
                return;
            }

            listContainer.innerHTML = mockData.map(app => `
                <div class="application-card" data-status="${app.status}">
                    <div class="card-header">
                        <div>
                            <span class="case-number">${app.caseNumber}</span>
                            <span class="status-badge status-${app.status}">${app.statusText}</span>
                        </div>
                        <span class="bid-date">${app.bidDate}</span>
                    </div>
                    <div class="card-body">
                        <p class="address"><i class="fas fa-map-marker-alt"></i> ${app.address}</p>
                        <div class="price-info">
                            <div>
                                <span class="label">감정가</span>
                                <span class="value">${formatPrice(app.appraisalPrice)}원</span>
                            </div>
                            <div>
                                <span class="label">입찰가</span>
                                <span class="value highlight">${formatPrice(app.bidPrice)}원</span>
                            </div>
                        </div>
                        ${app.expertName ? `<p class="expert-info"><i class="fas fa-user-tie"></i> 담당 법무사: ${app.expertName}</p>` : ''}
                    </div>
                    <div class="card-footer">
                        <button class="btn btn-sm btn-outline" onclick="viewDetail(${app.id})">상세보기</button>
                        ${app.status === 'matching' ? '<button class="btn btn-sm btn-danger" onclick="cancelApplication(' + app.id + ')">취소하기</button>' : ''}
                    </div>
                </div>
            `).join('');
        }

        // 결제 내역 로드
        function loadPayments() {
            const listContainer = document.getElementById('paymentsList');
            
            // TODO: 실제 API에서 데이터 가져오기
            const mockData = [
                {
                    id: 1,
                    date: '2024-02-10 14:30',
                    amount: 99000,
                    method: '카드',
                    status: 'completed',
                    caseNumber: '2024타경12345'
                },
                {
                    id: 2,
                    date: '2024-02-15 10:20',
                    amount: 99000,
                    method: '계좌이체',
                    status: 'completed',
                    caseNumber: '2024타경54321'
                }
            ];

            if (mockData.length === 0) {
                listContainer.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>결제 내역이 없습니다.</p></div>';
                return;
            }

            listContainer.innerHTML = `
                <table class="payments-table">
                    <thead>
                        <tr>
                            <th>결제일시</th>
                            <th>사건번호</th>
                            <th>금액</th>
                            <th>결제수단</th>
                            <th>상태</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${mockData.map(payment => `
                            <tr>
                                <td>${payment.date}</td>
                                <td>${payment.caseNumber}</td>
                                <td><strong>${formatPrice(payment.amount)}원</strong></td>
                                <td>${payment.method}</td>
                                <td><span class="status-badge status-success">결제완료</span></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        // 필터링
        function filterApplications(status) {
            document.querySelectorAll('.filter-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            
            const cards = document.querySelectorAll('.application-card');
            cards.forEach(card => {
                if (status === 'all' || card.dataset.status === status) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        // 가격 포맷팅
        function formatPrice(price) {
            return price.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }

        // 상세보기
        function viewDetail(id) {
            alert('상세보기 기능은 추후 구현 예정입니다.\n신청 ID: ' + id);
        }

        // 취소하기
        function cancelApplication(id) {
            if (confirm('정말 취소하시겠습니까?')) {
                alert('취소 기능은 추후 구현 예정입니다.\n신청 ID: ' + id);
            }
        }

        // 회원정보 수정
        document.getElementById('profileForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const newPasswordConfirm = document.getElementById('newPasswordConfirm').value;
            
            if (newPassword && newPassword !== newPasswordConfirm) {
                alert('비밀번호가 일치하지 않습니다.');
                return;
            }
            
            // TODO: API 연동
            alert('회원정보가 수정되었습니다.');
        });

        // 로그아웃
        function handleLogout() {
            if (confirm('로그아웃 하시겠습니까?')) {
                Auth.logout();
            }
        }

        // 초기 로드
        loadApplications();
    </script>
</body>
</html>
