<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>법무사 마이페이지 - 대리입찰 톡</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/mypage.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container nav-container">
            <div class="nav-logo" onclick="window.location.href='index.html'" style="cursor: pointer;">
                <i class="fas fa-comment-dots"></i>
                <span>대리입찰 톡</span>
            </div>
            <div class="nav-actions">
                <span id="userName" style="font-weight: 600; margin-right: 1rem;"></span>
                <button class="btn btn-outline" onclick="handleLogout()">로그아웃</button>
            </div>
        </div>
    </nav>

    <div class="mypage-container">
        <aside class="mypage-sidebar">
            <div class="sidebar-profile">
                <div class="profile-avatar">
                    <i class="fas fa-user-tie"></i>
                </div>
                <h3 id="profileName">법무사</h3>
                <p id="profileEmail">expert@example.com</p>
                <span class="expert-badge">⚖️ 법무사</span>
            </div>
            
            <nav class="sidebar-menu">
                <a href="#requests" class="menu-item active" onclick="showSection('requests', this)">
                    <i class="fas fa-bell"></i> 배정 요청
                </a>
                <a href="#ongoing" class="menu-item" onclick="showSection('ongoing', this)">
                    <i class="fas fa-tasks"></i> 진행 중
                </a>
                <a href="#completed" class="menu-item" onclick="showSection('completed', this)">
                    <i class="fas fa-check-circle"></i> 완료 내역
                </a>
                <a href="#settlement" class="menu-item" onclick="showSection('settlement', this)">
                    <i class="fas fa-won-sign"></i> 정산 내역
                </a>
                <a href="#profile" class="menu-item" onclick="showSection('profile', this)">
                    <i class="fas fa-user-edit"></i> 회원정보
                </a>
            </nav>
        </aside>

        <main class="mypage-content">
            <!-- 배정 요청 섹션 -->
            <section id="requestsSection" class="content-section active">
                <div class="section-header">
                    <h2><i class="fas fa-bell"></i> 배정 요청</h2>
                    <div class="stats-mini">
                        <span class="stat-item"><i class="fas fa-clock"></i> 대기 중: <strong id="pendingCount">0</strong></span>
                    </div>
                </div>

                <div id="requestsList" class="applications-list">
                    <!-- 배정 요청이 여기에 동적으로 추가됩니다 -->
                </div>
            </section>

            <!-- 진행 중 섹션 -->
            <section id="ongoingSection" class="content-section">
                <div class="section-header">
                    <h2><i class="fas fa-tasks"></i> 진행 중인 입찰</h2>
                </div>

                <div id="ongoingList" class="applications-list">
                    <!-- 진행 중인 입찰이 여기에 동적으로 추가됩니다 -->
                </div>
            </section>

            <!-- 완료 내역 섹션 -->
            <section id="completedSection" class="content-section">
                <div class="section-header">
                    <h2><i class="fas fa-check-circle"></i> 완료 내역</h2>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <i class="fas fa-gavel"></i>
                        <div class="stat-value" id="totalCompleted">0</div>
                        <div class="stat-label">총 처리 건수</div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-trophy"></i>
                        <div class="stat-value" id="successCount">0</div>
                        <div class="stat-label">낙찰 건수</div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-percentage"></i>
                        <div class="stat-value" id="successRate">0%</div>
                        <div class="stat-label">낙찰률</div>
                    </div>
                </div>

                <div id="completedList" class="applications-list">
                    <!-- 완료된 입찰이 여기에 동적으로 추가됩니다 -->
                </div>
            </section>

            <!-- 정산 내역 섹션 -->
            <section id="settlementSection" class="content-section">
                <div class="section-header">
                    <h2><i class="fas fa-won-sign"></i> 정산 내역</h2>
                </div>

                <div class="settlement-summary">
                    <div class="summary-card">
                        <div class="summary-label">이번 달 정산 예정</div>
                        <div class="summary-value" id="thisMonthAmount">0원</div>
                    </div>
                    <div class="summary-card">
                        <div class="summary-label">총 누적 정산</div>
                        <div class="summary-value" id="totalAmount">0원</div>
                    </div>
                </div>

                <div id="settlementList" class="payments-list">
                    <!-- 정산 내역이 여기에 동적으로 추가됩니다 -->
                </div>
            </section>

            <!-- 회원정보 섹션 -->
            <section id="profileSection" class="content-section">
                <div class="section-header">
                    <h2><i class="fas fa-user-edit"></i> 회원정보</h2>
                </div>

                <div class="profile-form-container">
                    <form id="profileForm">
                        <div class="form-group">
                            <label>아이디</label>
                            <input type="text" id="profileUserId" disabled>
                        </div>
                        
                        <div class="form-group">
                            <label>이메일</label>
                            <input type="email" id="profileEmailInput" disabled>
                        </div>
                        
                        <div class="form-group">
                            <label>이름</label>
                            <input type="text" id="profileNameInput" required>
                        </div>
                        
                        <div class="form-group">
                            <label>법무사 등록번호</label>
                            <input type="text" id="licenseNumber" disabled>
                        </div>
                        
                        <div class="form-group">
                            <label>휴대폰 번호</label>
                            <input type="tel" id="profilePhone" required>
                        </div>
                        
                        <div class="form-group">
                            <label>사무소 주소</label>
                            <input type="text" id="officeAddress" required>
                        </div>
                        
                        <div class="form-group">
                            <label>비밀번호 변경</label>
                            <input type="password" id="newPassword" placeholder="새 비밀번호 (변경 시에만 입력)">
                        </div>
                        
                        <div class="form-group">
                            <label>비밀번호 확인</label>
                            <input type="password" id="newPasswordConfirm" placeholder="새 비밀번호 확인">
                        </div>
                        
                        <button type="submit" class="btn btn-primary">저장하기</button>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // 로그인 체크
        if (!Auth.isLoggedIn() || Auth.getUserType() !== 'expert') {
            alert('법무사 로그인이 필요합니다.');
            window.location.href = 'login.html';
        }

        // 사용자 정보 로드
        const user = Auth.getCurrentUser();
        document.getElementById('userName').textContent = user.name;
        document.getElementById('profileName').textContent = user.name;
        document.getElementById('profileEmail').textContent = user.email;
        document.getElementById('profileUserId').value = user.userId || user.email;
        document.getElementById('profileEmailInput').value = user.email;
        document.getElementById('profileNameInput').value = user.name;
        document.getElementById('profilePhone').value = user.phone || '';
        document.getElementById('licenseNumber').value = user.licenseNumber || '서울-12345';
        document.getElementById('officeAddress').value = user.officeAddress || '';

        // 섹션 전환
        function showSection(section, el) {
            // 메뉴 활성화 (클릭된 a 태그 또는 가장 가까운 .menu-item 찾기)
            const clickedItem = el ? el.closest('.menu-item') || el : event.currentTarget;
            document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
            if (clickedItem) clickedItem.classList.add('active');

            // 섹션 전환
            document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));

            if (section === 'requests') {
                document.getElementById('requestsSection').classList.add('active');
                loadRequests();
            } else if (section === 'ongoing') {
                document.getElementById('ongoingSection').classList.add('active');
                loadOngoing();
            } else if (section === 'completed') {
                document.getElementById('completedSection').classList.add('active');
                loadCompleted();
            } else if (section === 'settlement') {
                document.getElementById('settlementSection').classList.add('active');
                loadSettlement();
            } else if (section === 'profile') {
                document.getElementById('profileSection').classList.add('active');
            }
        }

        // ── 공통 유틸 ───────────────────────────────────────────
        function formatPrice(price) {
            if (!price) return '0';
            return Number(price).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }

        function formatTimeRemaining(seconds) {
            if (seconds <= 0) return '마감';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            return h > 0 ? `${h}시간 ${m}분` : `${m}분`;
        }

        // ── 로딩 스피너 ─────────────────────────────────────────
        function setLoading(containerId) {
            document.getElementById(containerId).innerHTML =
                '<div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>불러오는 중...</p></div>';
        }

        // ── 배정 요청 로드 (실제 API) ───────────────────────────
        async function loadRequests() {
            const listContainer = document.getElementById('requestsList');
            setLoading('requestsList');
            try {
                const data = await API.applications.getByExpertId(user.userId || user.id, '매칭중');
                document.getElementById('pendingCount').textContent = data.length;

                if (data.length === 0) {
                    listContainer.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>배정 요청이 없습니다.</p></div>';
                    return;
                }

                listContainer.innerHTML = data.map(req => {
                    const bidDateMs = req.bid_date ? new Date(req.bid_date).getTime() - Date.now() : 0;
                    const remainSec = Math.floor(bidDateMs / 1000);
                    const isUrgent = remainSec > 0 && remainSec < 900;
                    const timeLabel = remainSec > 0 ? formatTimeRemaining(remainSec) + ' 남음' : '마감';

                    return `
                    <div class="application-card request-card">
                        <div class="card-header">
                            <div>
                                <span class="case-number">${req.case_number || '-'}</span>
                                <span class="timer-badge ${isUrgent ? 'urgent' : ''}">
                                    <i class="fas fa-clock"></i> ${timeLabel}
                                </span>
                            </div>
                            <span class="bid-date">입찰일: ${req.bid_date || '-'}</span>
                        </div>
                        <div class="card-body">
                            <p class="address"><i class="fas fa-map-marker-alt"></i> ${req.address || req.court || '-'}</p>
                            <p class="client-info"><i class="fas fa-user"></i> 신청자: ${req.applicant_name || '-'}</p>
                            <div class="price-info">
                                <div>
                                    <span class="label">감정가</span>
                                    <span class="value">${formatPrice(req.appraisal_price)}원</span>
                                </div>
                                <div>
                                    <span class="label">입찰가</span>
                                    <span class="value highlight">${formatPrice(req.bid_amount)}원</span>
                                </div>
                            </div>
                            <p style="color:#666;font-size:0.88rem;margin-top:0.5rem;">
                                <i class="fas fa-clock"></i> 요청: ${req.assigned_at ? req.assigned_at.slice(0,16).replace('T',' ') : '-'}
                            </p>
                        </div>
                        <div class="card-footer">
                            <button class="btn btn-success" onclick="acceptRequest('${req.id}')">
                                <i class="fas fa-check"></i> 수락하기
                            </button>
                            <button class="btn btn-outline" onclick="rejectRequest('${req.id}')">
                                <i class="fas fa-times"></i> 거부하기
                            </button>
                        </div>
                    </div>`;
                }).join('');
            } catch (err) {
                console.error('배정 요청 로드 오류:', err);
                listContainer.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>배정 요청이 없습니다.</p></div>';
                document.getElementById('pendingCount').textContent = '0';
            }
        }

        // ── 진행 중 로드 (실제 API) ────────────────────────────
        async function loadOngoing() {
            const listContainer = document.getElementById('ongoingList');
            setLoading('ongoingList');
            try {
                const data = await API.applications.getByExpertId(user.userId || user.id, '진행중');

                if (data.length === 0) {
                    listContainer.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>진행 중인 입찰이 없습니다.</p></div>';
                    return;
                }

                listContainer.innerHTML = data.map(item => `
                    <div class="application-card">
                        <div class="card-header">
                            <div>
                                <span class="case-number">${item.case_number || '-'}</span>
                                <span class="status-badge status-confirmed">진행중</span>
                            </div>
                            <span class="bid-date">입찰일: ${item.bid_date || '-'}</span>
                        </div>
                        <div class="card-body">
                            <p class="address"><i class="fas fa-map-marker-alt"></i> ${item.address || item.court || '-'}</p>
                            <p class="client-info"><i class="fas fa-user"></i> 신청자: ${item.applicant_name || '-'}</p>
                            <div class="price-info">
                                <div>
                                    <span class="label">감정가</span>
                                    <span class="value">${formatPrice(item.appraisal_price)}원</span>
                                </div>
                                <div>
                                    <span class="label">입찰가</span>
                                    <span class="value highlight">${formatPrice(item.bid_amount)}원</span>
                                </div>
                            </div>
                        </div>
                        <div class="card-footer">
                            <button class="btn btn-outline" onclick="viewDetail('${item.id}')">상세보기</button>
                            <button class="btn btn-primary" onclick="updateStatus('${item.id}')">결과 입력</button>
                        </div>
                    </div>`).join('');
            } catch (err) {
                console.error('진행 중 로드 오류:', err);
                listContainer.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>진행 중인 입찰이 없습니다.</p></div>';
            }
        }

        // ── 완료 내역 로드 (실제 API) ──────────────────────────
        async function loadCompleted() {
            const listContainer = document.getElementById('completedList');
            setLoading('completedList');
            try {
                const data = await API.applications.getByExpertId(user.userId || user.id, '완료');
                const successList = data.filter(i => i.status === '낙찰' || i.result === 'success');

                document.getElementById('totalCompleted').textContent = data.length;
                document.getElementById('successCount').textContent = successList.length;
                document.getElementById('successRate').textContent = data.length
                    ? Math.round((successList.length / data.length) * 100) + '%' : '0%';

                if (data.length === 0) {
                    listContainer.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>완료된 입찰이 없습니다.</p></div>';
                    return;
                }

                listContainer.innerHTML = data.map(item => {
                    const isSuccess = item.status === '낙찰' || item.result === 'success';
                    return `
                    <div class="application-card">
                        <div class="card-header">
                            <div>
                                <span class="case-number">${item.case_number || '-'}</span>
                                <span class="status-badge ${isSuccess ? 'status-success' : 'status-cancelled'}">
                                    ${isSuccess ? '낙찰 🎉' : '패찰'}
                                </span>
                            </div>
                            <span class="bid-date">완료: ${item.completed_at ? item.completed_at.slice(0,10) : (item.bid_date || '-')}</span>
                        </div>
                        <div class="card-body">
                            <p class="address"><i class="fas fa-map-marker-alt"></i> ${item.address || item.court || '-'}</p>
                            <div class="price-info">
                                <div>
                                    <span class="label">입찰가</span>
                                    <span class="value">${formatPrice(item.bid_amount)}원</span>
                                </div>
                                <div>
                                    <span class="label">수수료</span>
                                    <span class="value highlight">${formatPrice(item.service_fee || 99000)}원</span>
                                </div>
                            </div>
                        </div>
                    </div>`;
                }).join('');
            } catch (err) {
                console.error('완료 내역 로드 오류:', err);
                listContainer.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>완료된 입찰이 없습니다.</p></div>';
            }
        }

        // ── 정산 내역 로드 (실제 API – 완료 건 집계) ──────────
        async function loadSettlement() {
            const listContainer = document.getElementById('settlementList');
            setLoading('settlementList');
            try {
                const data = await API.applications.getByExpertId(user.userId || user.id, '완료');

                // 월별 집계
                const monthly = {};
                data.forEach(app => {
                    const month = (app.completed_at || app.bid_date || '').slice(0, 7);
                    if (!month) return;
                    if (!monthly[month]) monthly[month] = { count: 0, amount: 0 };
                    monthly[month].count++;
                    monthly[month].amount += Number(app.service_fee || 99000);
                });

                const months = Object.keys(monthly).sort().reverse();
                const thisMonthAmt = months.length ? monthly[months[0]].amount : 0;
                const totalAmt = months.reduce((s, m) => s + monthly[m].amount, 0);

                document.getElementById('thisMonthAmount').textContent = formatPrice(thisMonthAmt) + '원';
                document.getElementById('totalAmount').textContent = formatPrice(totalAmt) + '원';

                if (months.length === 0) {
                    listContainer.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>정산 내역이 없습니다.</p></div>';
                    return;
                }

                listContainer.innerHTML = `
                    <table class="payments-table">
                        <thead>
                            <tr><th>정산월</th><th>처리 건수</th><th>정산 금액</th><th>상태</th></tr>
                        </thead>
                        <tbody>
                            ${months.map(m => `
                                <tr>
                                    <td>${m}</td>
                                    <td>${monthly[m].count}건</td>
                                    <td><strong>${formatPrice(monthly[m].amount)}원</strong></td>
                                    <td><span class="status-badge status-success">정산완료</span></td>
                                </tr>`).join('')}
                        </tbody>
                    </table>`;
            } catch (err) {
                console.error('정산 내역 로드 오류:', err);
                listContainer.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>정산 내역이 없습니다.</p></div>';
            }
        }

        // ── 수락 / 거부 (실제 API) ─────────────────────────────
        async function acceptRequest(id) {
            if (!confirm('이 요청을 수락하시겠습니까?')) return;
            try {
                await API.applications.updateStatus(id, '진행중', {
                    acceptedAt: new Date().toISOString(),
                    expertId: user.userId || user.id,
                    expertName: user.name
                });
                alert('수락되었습니다. 신청자에게 알림이 발송됩니다.');
                loadRequests();
            } catch (err) {
                alert('처리 중 오류가 발생했습니다.');
            }
        }

        async function rejectRequest(id) {
            if (!confirm('이 요청을 거부하시겠습니까?\n거부 시 다른 법무사에게 자동 배정됩니다.')) return;
            try {
                await API.applications.updateStatus(id, '매칭중', {
                    rejectedExpert: user.userId || user.id,
                    rejectedAt: new Date().toISOString()
                });
                alert('거부되었습니다.');
                loadRequests();
            } catch (err) {
                alert('처리 중 오류가 발생했습니다.');
            }
        }

        // ── 결과 입력 ──────────────────────────────────────────
        async function updateStatus(id) {
            const result = prompt('입찰 결과를 입력하세요:\n1 = 낙찰\n2 = 패찰');
            if (!result) return;
            const status = result === '1' ? '낙찰' : '완료';
            try {
                await API.applications.updateStatus(id, status, {
                    completedAt: new Date().toISOString(),
                    result: result === '1' ? 'success' : 'fail'
                });
                alert('결과가 입력되었습니다.');
                loadOngoing();
            } catch (err) {
                alert('처리 중 오류가 발생했습니다.');
            }
        }

        async function viewDetail(id) {
            try {
                const app = await API.applications.getById(id);
                if (!app) { alert('정보를 불러올 수 없습니다.'); return; }
                alert([
                    `📋 상세 정보`,
                    `━━━━━━━━━━━━━━━━━━━━`,
                    `사건번호: ${app.case_number || '-'}`,
                    `법원: ${app.court || '-'}`,
                    `주소: ${app.address || '-'}`,
                    `입찰가: ${formatPrice(app.bid_amount)}원`,
                    `입찰일: ${app.bid_date || '-'}`,
                    `신청자: ${app.applicant_name || '-'}`,
                    `연락처: ${app.phone || '-'}`,
                    `상태: ${app.status || '-'}`
                ].join('\n'));
            } catch (err) {
                alert('상세 정보를 불러오는 중 오류가 발생했습니다.');
            }
        }

        function handleLogout() {
            if (confirm('로그아웃 하시겠습니까?')) Auth.logout();
        }

        // ── 회원정보 저장 (실제 API) ───────────────────────────
        document.getElementById('profileForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const newPassword = document.getElementById('newPassword').value;
            const newPasswordConfirm = document.getElementById('newPasswordConfirm').value;
            if (newPassword && newPassword !== newPasswordConfirm) {
                alert('비밀번호가 일치하지 않습니다.');
                return;
            }
            const updates = {
                name: document.getElementById('profileNameInput').value,
                phone: document.getElementById('profilePhone').value,
                officeAddress: document.getElementById('officeAddress').value
            };
            if (newPassword) updates.password = newPassword;

            const btn = this.querySelector('button[type="submit"]');
            btn.disabled = true; btn.textContent = '저장 중...';

            const result = await Auth.saveProfile(updates);
            alert(result.success ? '회원정보가 저장되었습니다.' : (result.message || '저장 중 오류가 발생했습니다.'));
            btn.disabled = false; btn.textContent = '저장하기';
        });

        // 초기 로드
        loadRequests();
    </script>
