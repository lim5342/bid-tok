<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 재설정 - 대리입찰 톡</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .find-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 3rem;
            width: 100%;
            max-width: 500px;
        }

        .find-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .find-logo i { font-size: 3rem; color: #667eea; margin-bottom: 1rem; }
        .find-logo h1 { font-size: 1.8rem; color: #333; margin-bottom: 0.5rem; }
        .find-logo p { color: #666; font-size: 0.95rem; }

        /* 단계 표시 */
        .steps {
            display: flex;
            justify-content: center;
            gap: 0;
            margin-bottom: 2rem;
        }
        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            position: relative;
        }
        .step:not(:last-child)::after {
            content: '';
            position: absolute;
            top: 16px;
            left: 50%;
            width: 100%;
            height: 2px;
            background: #e0e0e0;
            z-index: 0;
        }
        .step.done:not(:last-child)::after { background: #667eea; }
        .step-circle {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #e0e0e0;
            color: #999;
            font-weight: 700;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
            transition: all 0.3s;
        }
        .step.active .step-circle { background: #667eea; color: white; }
        .step.done .step-circle { background: #28a745; color: white; }
        .step-label { font-size: 0.75rem; color: #999; margin-top: 4px; }
        .step.active .step-label { color: #667eea; font-weight: 600; }
        .step.done .step-label { color: #28a745; }

        .form-group { margin-bottom: 1.5rem; }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 600;
        }
        .form-group input {
            width: 100%;
            padding: 0.9rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        .form-group input:focus { outline: none; border-color: #667eea; }
        .form-group input.input-error { border-color: #dc3545; }
        .form-group input.input-ok { border-color: #28a745; }

        .phone-verify-group { display: flex; gap: 0.5rem; }
        .phone-verify-group input { flex: 1; }

        .verify-btn {
            padding: 0.9rem 1.2rem;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.3s;
            flex-shrink: 0;
        }
        .verify-btn:hover { background: #5568d3; }
        .verify-btn:disabled { background: #ccc; cursor: not-allowed; }

        .verify-success { color: #28a745; font-weight: 600; margin-top: 0.5rem; font-size: 0.9rem; }
        .verify-timer { color: #dc3545; font-weight: 600; font-size: 0.85rem; }

        .pw-hint { font-size: 0.82rem; color: #999; margin-top: 0.4rem; }
        .pw-hint.ok { color: #28a745; }
        .pw-hint.err { color: #dc3545; }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.3s;
            margin-top: 0.5rem;
        }
        .btn-submit:hover { transform: translateY(-2px); }
        .btn-submit:disabled { background: #ccc; cursor: not-allowed; transform: none; }

        /* 완료 화면 */
        .result-box {
            display: none;
            text-align: center;
            padding: 1rem 0;
        }
        .result-box.show { display: block; }
        .result-icon { font-size: 4rem; margin-bottom: 1rem; }
        .result-box h2 { color: #333; margin-bottom: 0.5rem; }
        .result-box p { color: #666; margin-bottom: 2rem; font-size: 0.95rem; }

        .back-link { text-align: center; margin-top: 1.5rem; }
        .back-link a { color: #667eea; text-decoration: none; font-weight: 600; }
        .back-link a:hover { text-decoration: underline; }

        @media (max-width: 768px) {
            .find-container { padding: 2rem; }
        }
    </style>
</head>
<body>
    <div class="find-container">

        <!-- 로고 -->
        <div class="find-logo">
            <i class="fas fa-lock"></i>
            <h1>비밀번호 재설정</h1>
            <p>본인 인증 후 새 비밀번호를 설정하세요</p>
        </div>

        <!-- 단계 표시 -->
        <div class="steps" id="stepsBar">
            <div class="step active" id="step1">
                <div class="step-circle">1</div>
                <div class="step-label">본인확인</div>
            </div>
            <div class="step" id="step2">
                <div class="step-circle">2</div>
                <div class="step-label">SMS인증</div>
            </div>
            <div class="step" id="step3">
                <div class="step-circle">3</div>
                <div class="step-label">비밀번호설정</div>
            </div>
        </div>

        <!-- STEP 1: 이메일 + 전화번호 입력 -->
        <div id="formStep1">
            <div class="form-group">
                <label for="email">이메일</label>
                <input type="email" id="email" placeholder="가입 시 등록한 이메일">
            </div>
            <div class="form-group">
                <label for="phone">휴대폰 번호</label>
                <div class="phone-verify-group">
                    <input type="tel" id="phone" placeholder="010-1234-5678" maxlength="13">
                    <button type="button" class="verify-btn" id="sendVerify" onclick="sendVerifyCode()">인증번호 발송</button>
                </div>
            </div>
        </div>

        <!-- STEP 2: 인증번호 입력 -->
        <div id="formStep2" style="display:none;">
            <div class="form-group">
                <label>인증번호 입력</label>
                <div class="phone-verify-group">
                    <input type="text" id="verifyCode" placeholder="인증번호 6자리" maxlength="6">
                    <button type="button" class="verify-btn" id="confirmVerify" onclick="confirmVerifyCode()">인증 확인</button>
                </div>
                <small id="verifyTimer" class="verify-timer"></small>
                <div id="verifySuccess" class="verify-success" style="display:none;">✓ 인증이 완료되었습니다</div>
            </div>
        </div>

        <!-- STEP 3: 새 비밀번호 입력 -->
        <div id="formStep3" style="display:none;">
            <div class="form-group">
                <label for="newPw">새 비밀번호</label>
                <input type="password" id="newPw" placeholder="8자 이상 입력" oninput="checkPw()">
                <div class="pw-hint" id="pwHint">8자 이상 입력해주세요</div>
            </div>
            <div class="form-group">
                <label for="newPwConfirm">새 비밀번호 확인</label>
                <input type="password" id="newPwConfirm" placeholder="비밀번호를 다시 입력" oninput="checkPwConfirm()">
                <div class="pw-hint" id="pwConfirmHint"></div>
            </div>
            <button type="button" class="btn-submit" id="submitBtn" onclick="resetPassword()" disabled>
                비밀번호 재설정 완료
            </button>
        </div>

        <!-- 완료 화면 -->
        <div class="result-box" id="resultBox">
            <div class="result-icon">🎉</div>
            <h2>비밀번호가 변경되었습니다!</h2>
            <p>새 비밀번호로 바로 로그인하세요.</p>
            <button class="btn-submit" onclick="window.location.href='login.html'">
                <i class="fas fa-sign-in-alt" style="margin-right:6px;"></i>로그인하러 가기
            </button>
        </div>

        <div class="back-link">
            <a href="login.html"><i class="fas fa-arrow-left"></i> 로그인으로 돌아가기</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="js/api.js"></script>
    <script>
        const SMS_WORKER_URL = 'https://bidtok-sms-proxy.qkqk5342.workers.dev';

        let verifyTimer  = null;
        let phoneVerified = false;
        let matchedUserId = null;  // 조회된 Firestore 문서 ID

        // ── 전화번호 포맷 ──────────────────────────
        document.getElementById('phone').addEventListener('input', function() {
            const v = this.value.replace(/[^0-9]/g, '');
            if (v.length <= 3)      this.value = v;
            else if (v.length <= 7) this.value = v.slice(0,3) + '-' + v.slice(3);
            else                    this.value = v.slice(0,3) + '-' + v.slice(3,7) + '-' + v.slice(7,11);
        });

        // ── 단계 이동 헬퍼 ────────────────────────
        function goStep(n) {
            // 이전 단계 done, 현재 단계 active
            ['step1','step2','step3'].forEach((id, i) => {
                const el = document.getElementById(id);
                el.classList.remove('active','done');
                if (i + 1 < n)      el.classList.add('done');
                else if (i + 1 === n) el.classList.add('active');
            });
            document.getElementById('formStep1').style.display = n === 1 ? 'block' : 'none';
            document.getElementById('formStep2').style.display = n === 2 ? 'block' : 'none';
            document.getElementById('formStep3').style.display = n === 3 ? 'block' : 'none';
        }

        // ── STEP 1 → STEP 2: SMS 발송 ─────────────
        async function sendVerifyCode() {
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.replace(/[^0-9]/g, '');

            if (!email || !email.includes('@')) {
                alert('이메일을 올바르게 입력해주세요.');
                document.getElementById('email').focus();
                return;
            }
            if (phone.length !== 11) {
                alert('올바른 휴대폰 번호를 입력해주세요.');
                document.getElementById('phone').focus();
                return;
            }

            const btn = document.getElementById('sendVerify');
            btn.disabled = true;
            btn.textContent = '확인 중...';

            try {
                // Firestore에서 이메일로 계정 조회
                const db = getDB();
                const snap = await db.collection('users')
                    .where('email', '==', email)
                    .limit(10)
                    .get();

                if (snap.empty) {
                    alert('이메일과 일치하는 계정이 없습니다.\n가입 시 사용한 이메일을 확인해주세요.');
                    btn.disabled = false;
                    btn.textContent = '인증번호 발송';
                    return;
                }

                // 전화번호 일치 확인 (숫자만 비교)
                const users = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                const matched = users.find(u =>
                    (u.phone || '').replace(/[^0-9]/g, '') === phone &&
                    u.userType !== 'admin'
                );

                if (!matched) {
                    alert('이메일과 휴대폰 번호가 일치하는 계정이 없습니다.\n다시 확인해주세요.');
                    btn.disabled = false;
                    btn.textContent = '인증번호 발송';
                    return;
                }

                matchedUserId = matched.id;

                // 계정 확인 완료 → SMS 발송
                btn.textContent = '발송 중...';
                const verifyCode = Math.floor(100000 + Math.random() * 900000).toString();
                const res = await fetch(SMS_WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ to: phone, code: verifyCode })
                });
                const data = await res.json();

                if (res.ok && data.success) {
                    sessionStorage.setItem('findPw_verifyCode', verifyCode);
                    btn.textContent = '발송완료';
                    document.getElementById('phone').disabled = true;
                    document.getElementById('email').disabled = true;

                    goStep(2);
                    startTimer(180);
                    alert('📱 인증번호가 발송되었습니다.\n휴대폰 문자를 확인해주세요.');
                } else {
                    alert('문자 발송에 실패했습니다.\n' + (data.error || ''));
                    btn.disabled = false;
                    btn.textContent = '인증번호 발송';
                }
            } catch (e) {
                console.error('오류:', e);
                alert('오류: ' + (e.message || e.toString()) + '\n\n잠시 후 다시 시도해주세요.');
                btn.disabled = false;
                btn.textContent = '인증번호 발송';
            }
        }

        // ── 타이머 ────────────────────────────────
        function startTimer(seconds) {
            const timerEl = document.getElementById('verifyTimer');
            let remaining = seconds;
            if (verifyTimer) clearInterval(verifyTimer);
            verifyTimer = setInterval(() => {
                remaining--;
                const m = Math.floor(remaining / 60);
                const s = remaining % 60;
                timerEl.textContent = `${m}:${s.toString().padStart(2,'0')}`;
                if (remaining <= 0) {
                    clearInterval(verifyTimer);
                    timerEl.textContent = '인증시간 만료';
                    document.getElementById('confirmVerify').disabled = true;
                }
            }, 1000);
        }

        // ── STEP 2: 인증번호 확인 → STEP 3 ────────
        function confirmVerifyCode() {
            const inputCode = document.getElementById('verifyCode').value.trim();
            const savedCode = sessionStorage.getItem('findPw_verifyCode');
            if (!inputCode) { alert('인증번호를 입력해주세요.'); return; }
            if (inputCode !== savedCode) { alert('인증번호가 일치하지 않습니다.'); return; }

            phoneVerified = true;
            clearInterval(verifyTimer);
            document.getElementById('verifySuccess').style.display = 'block';
            document.getElementById('verifyTimer').style.display = 'none';
            document.getElementById('verifyCode').disabled = true;
            document.getElementById('confirmVerify').disabled = true;

            // STEP 3으로 이동 (약간 딜레이)
            setTimeout(() => goStep(3), 600);
        }

        // ── 비밀번호 유효성 검사 ──────────────────
        function checkPw() {
            const pw = document.getElementById('newPw').value;
            const hint = document.getElementById('pwHint');
            const input = document.getElementById('newPw');
            if (pw.length === 0) {
                hint.textContent = '8자 이상 입력해주세요';
                hint.className = 'pw-hint';
                input.className = '';
            } else if (pw.length < 8) {
                hint.textContent = `${8 - pw.length}자 더 입력해주세요`;
                hint.className = 'pw-hint err';
                input.className = 'input-error';
            } else {
                hint.textContent = '✓ 사용 가능한 비밀번호입니다';
                hint.className = 'pw-hint ok';
                input.className = 'input-ok';
            }
            checkPwConfirm();
            updateSubmitBtn();
        }

        function checkPwConfirm() {
            const pw  = document.getElementById('newPw').value;
            const pw2 = document.getElementById('newPwConfirm').value;
            const hint = document.getElementById('pwConfirmHint');
            const input = document.getElementById('newPwConfirm');
            if (pw2.length === 0) {
                hint.textContent = '';
                input.className = '';
            } else if (pw === pw2) {
                hint.textContent = '✓ 비밀번호가 일치합니다';
                hint.className = 'pw-hint ok';
                input.className = 'input-ok';
            } else {
                hint.textContent = '비밀번호가 일치하지 않습니다';
                hint.className = 'pw-hint err';
                input.className = 'input-error';
            }
            updateSubmitBtn();
        }

        function updateSubmitBtn() {
            const pw  = document.getElementById('newPw').value;
            const pw2 = document.getElementById('newPwConfirm').value;
            document.getElementById('submitBtn').disabled = !(pw.length >= 8 && pw === pw2);
        }

        // ── STEP 3: 비밀번호 저장 ─────────────────
        async function resetPassword() {
            const pw = document.getElementById('newPw').value;
            if (!phoneVerified || !matchedUserId) {
                alert('본인 인증을 먼저 완료해주세요.');
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = '저장 중...';

            try {
                const db = getDB();
                await db.collection('users').doc(matchedUserId).update({
                    password: pw,
                    tempPassword: false,
                    updatedAt: new Date().toISOString()
                });

                // 완료 화면
                document.getElementById('stepsBar').style.display = 'none';
                document.getElementById('formStep3').style.display = 'none';
                document.getElementById('find-logo') && (document.querySelector('.find-logo').style.display = 'none');
                document.querySelector('.find-logo').style.display = 'none';
                document.getElementById('resultBox').classList.add('show');

            } catch (err) {
                console.error('비밀번호 변경 오류:', err);
                alert('저장 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
                btn.disabled = false;
                btn.textContent = '비밀번호 재설정 완료';
            }
        }
    </script>
</body>
</html>
