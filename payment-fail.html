<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결제 실패 - 대리입찰 톡</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: white; border-radius: 20px; padding: 3rem 2rem; max-width: 500px; width: 90%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        .icon-wrap { font-size: 4rem; margin-bottom: 1rem; }
        h1 { font-size: 1.6rem; color: #1a1a2e; margin-bottom: 0.5rem; }
        p { color: #666; line-height: 1.7; margin-bottom: 1.5rem; }
        .error-box { background: #fff0f0; border: 1.5px solid #ffcccc; border-radius: 12px; padding: 1rem 1.2rem; text-align: left; margin-bottom: 1.5rem; font-size: 0.88rem; color: #c0392b; }
        .btn-wrap { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
        .btn { padding: 0.85rem 1.5rem; border-radius: 10px; font-weight: 600; cursor: pointer; border: none; font-size: 0.95rem; text-decoration: none; display: inline-block; }
        .btn-primary { background: #1550E8; color: white; }
        .btn-outline { background: white; color: #1550E8; border: 2px solid #1550E8; }
    </style>
</head>
<body>
<div class="card">
    <div class="icon-wrap">😢</div>
    <h1>결제가 취소되었습니다</h1>
    <p>결제가 완료되지 않았습니다.<br>신청 내역은 저장되어 있으니 다시 시도해주세요.</p>
    <div class="error-box" id="errorMsg">
        결제를 취소하셨거나 오류가 발생했습니다.
    </div>
    <p style="font-size:0.85rem; color:#888;">문의: <a href="tel:02-853-5875" style="color:#1550E8;">02-853-5875</a> | 평일 09:00~18:00</p>
    <div class="btn-wrap">
        <a href="apply.html" class="btn btn-primary"><i class="fas fa-redo"></i> 다시 신청하기</a>
        <a href="index.html" class="btn btn-outline"><i class="fas fa-home"></i> 홈으로</a>
    </div>
</div>
<script>
    const params = new URLSearchParams(window.location.search);
    const msg = params.get('message');
    const code = params.get('code');
    if (msg) {
        document.getElementById('errorMsg').textContent = (code ? '[' + code + '] ' : '') + decodeURIComponent(msg);
    }
</script>
</body>
</html>
