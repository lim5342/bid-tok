<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아이디 찾기 - 대리입찰 톡</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .find-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 3rem;
            width: 100%;
            max-width: 500px;
        }

        .find-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .find-logo i {
            font-size: 3rem;
            color: #667eea;
            margin-bottom: 1rem;
        }

        .find-logo h1 {
            font-size: 1.8rem;
            color: #333;
            margin-bottom: 0.5rem;
        }

        .find-logo p {
            color: #666;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 0.9rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .phone-verify-group {
            display: flex;
            gap: 0.5rem;
            align-items: flex-start;
        }

        .phone-verify-group input {
            flex: 1;
        }

        .verify-btn {
            padding: 0.9rem 1.2rem;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.3s;
        }

        .verify-btn:hover {
            background: #5568d3;
        }

        .verify-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .verify-success {
            color: #28a745;
            font-weight: 600;
            margin-top: 0.5rem;
        }

        .verify-timer {
            color: #dc3545;
            font-weight: 600;
            margin-left: 0.5rem;
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.3s;
            margin-top: 1rem;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
        }

        .btn-submit:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .result-box {
            display: none;
            background: #f0f8ff;
            border: 2px solid #667eea;
            border-radius: 8px;
            padding: 1.5rem;
            margin-top: 1.5rem;
            text-align: center;
        }

        .result-box.show {
            display: block;
        }

        .result-box h3 {
            color: #667eea;
            margin-bottom: 1rem;
        }

        .result-box p {
            color: #666;
            margin-bottom: 1rem;
        }

        .result-email {
            background: white;
            padding: 1rem;
            border-radius: 8px;
            font-size: 1.3rem;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 1rem;
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .find-container {
                padding: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="find-container">
        <div class="find-logo">
            <i class="fas fa-user-search"></i>
            <h1>아이디 찾기</h1>
            <p>가입 시 등록한 이름과 휴대폰 번호를 입력해주세요</p>
        </div>

        <form id="findIdForm">
            <div class="form-group">
                <label for="name">이름</label>
                <input type="text" id="name" name="name" required placeholder="홍길동">
            </div>

            <div class="form-group">
                <label for="phone">휴대폰 번호</label>
                <div class="phone-verify-group">
                    <input type="tel" id="phone" name="phone" required placeholder="010-1234-5678" maxlength="13">
                    <button type="button" class="verify-btn" id="sendVerify" onclick="sendVerifyCode()">인증번호 발송</button>
                </div>
            </div>

            <div class="form-group" id="verifyCodeGroup" style="display: none;">
                <label for="verifyCode">인증번호 입력</label>
                <div class="phone-verify-group">
                    <input type="text" id="verifyCode" name="verifyCode" placeholder="인증번호 6자리" maxlength="6">
                    <button type="button" class="verify-btn" id="confirmVerify" onclick="confirmVerifyCode()">인증 확인</button>
                </div>
                <small id="verifyTimer" class="verify-timer"></small>
                <div id="verifySuccess" class="verify-success" style="display: none;">✓ 인증이 완료되었습니다</div>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn" disabled>아이디 찾기</button>
        </form>

        <div class="result-box" id="resultBox">
            <h3>✓ 아이디를 찾았습니다</h3>
            <p>회원님의 아이디는 다음과 같습니다.</p>
            <div class="result-email" id="resultUserId"></div>
            <button class="btn-submit" onclick="window.location.href='login.html'">로그인하러 가기</button>
        </div>

        <div class="back-link">
            <a href="login.html"><i class="fas fa-arrow-left"></i> 로그인으로 돌아가기</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="js/api.js"></script>
    <script>
        let verifyTimer = null;
        let phoneVerified = false;

        // 휴대폰 번호 포맷팅
        document.getElementById('phone').addEventListener('input', function() {
            const value = this.value.replace(/[^0-9]/g, '');
            let formatted = '';
            if (value.length <= 3) {
                formatted = value;
            } else if (value.length <= 7) {
                formatted = value.slice(0, 3) + '-' + value.slice(3);
            } else {
                formatted = value.slice(0, 3) + '-' + value.slice(3, 7) + '-' + value.slice(7, 11);
            }
            this.value = formatted;
        });

        // 솔라피 SMS Worker URL
        const SMS_WORKER_URL = 'https://bidtok-sms-proxy.qkqk5342.workers.dev';

        // 인증번호 발송
        async function sendVerifyCode() {
            const phone = document.getElementById('phone').value.replace(/[^0-9]/g, '');
            if (phone.length !== 11) {
                alert('올바른 휴대폰 번호를 입력해주세요.');
                return;
            }

            const sendBtn = document.getElementById('sendVerify');
            sendBtn.disabled = true;
            sendBtn.textContent = '발송 중...';

            const verifyCode = Math.floor(100000 + Math.random() * 900000).toString();

            try {
                const res = await fetch(SMS_WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ to: phone, code: verifyCode })
                });

                const data = await res.json();

                if (res.ok && data.success) {
                    sessionStorage.setItem('findId_verifyCode', verifyCode);

                    document.getElementById('verifyCodeGroup').style.display = 'block';
                    sendBtn.textContent = '발송완료';
                    document.getElementById('phone').disabled = true;

                    startTimer(180);
                    alert('📱 인증번호가 발송되었습니다.\n휴대폰 문자를 확인해주세요.');
                } else {
                    alert('문자 발송에 실패했습니다. 잠시 후 다시 시도해주세요.\n' + (data.error || ''));
                    sendBtn.disabled = false;
                    sendBtn.textContent = '인증번호 발송';
                }
            } catch (e) {
                console.error('SMS 발송 오류:', e);
                alert('네트워크 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
                sendBtn.disabled = false;
                sendBtn.textContent = '인증번호 발송';
            }
        }

        // 타이머
        function startTimer(seconds) {
            const timerEl = document.getElementById('verifyTimer');
            let remaining = seconds;
            if (verifyTimer) clearInterval(verifyTimer);
            verifyTimer = setInterval(() => {
                remaining--;
                const m = Math.floor(remaining / 60);
                const s = remaining % 60;
                timerEl.textContent = `${m}:${s.toString().padStart(2, '0')}`;
                if (remaining <= 0) {
                    clearInterval(verifyTimer);
                    timerEl.textContent = '인증시간 만료';
                    document.getElementById('confirmVerify').disabled = true;
                }
            }, 1000);
        }

        // 인증번호 확인
        function confirmVerifyCode() {
            const inputCode = document.getElementById('verifyCode').value.trim();
            const savedCode = sessionStorage.getItem('findId_verifyCode');
            if (!inputCode) { alert('인증번호를 입력해주세요.'); return; }
            if (inputCode === savedCode) {
                phoneVerified = true;
                clearInterval(verifyTimer);
                document.getElementById('verifySuccess').style.display = 'block';
                document.getElementById('verifyCodeGroup').querySelectorAll('input, button').forEach(el => el.disabled = true);
                document.getElementById('verifyTimer').style.display = 'none';
                document.getElementById('submitBtn').disabled = false;
            } else {
                alert('인증번호가 일치하지 않습니다.');
            }
        }

        // ── 아이디 찾기 폼 제출 ──────────────────
        document.getElementById('findIdForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            if (!phoneVerified) { alert('휴대폰 인증을 완료해주세요.'); return; }

            const name  = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const phoneClean = phone.replace(/[^0-9]/g, '');

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = '조회 중...';

            try {
                // Firestore에서 phone으로 조회
                const db = getDB();
                const timeout = new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 10000));

                // 하이픈 포함/미포함 두 가지 형식으로 조회
                const phoneFormatted = phoneClean.replace(/(\d{3})(\d{4})(\d{4})/, '$1-$2-$3');
                const [snap1, snap2] = await Promise.all([
                    Promise.race([
                        db.collection('users').where('phone', '==', phoneClean).get(),
                        timeout
                    ]),
                    Promise.race([
                        db.collection('users').where('phone', '==', phoneFormatted).get(),
                        new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 10000))
                    ])
                ]);

                const docs = [...snap1.docs, ...snap2.docs];
                // 중복 제거 (같은 id)
                const seen = new Set();
                const users = docs.filter(d => {
                    if (seen.has(d.id)) return false;
                    seen.add(d.id);
                    return true;
                }).map(d => ({ id: d.id, ...d.data() }));

                // 이름 일치 + 관리자 제외
                const matched = users.filter(u =>
                    u.name === name && u.userType !== 'admin'
                );

                if (matched.length === 0) {
                    alert('입력하신 정보와 일치하는 아이디가 없습니다.\n이름과 휴대폰 번호를 다시 확인해주세요.');
                    btn.disabled = false;
                    btn.textContent = '아이디 찾기';
                    return;
                }

                // 결과 표시 – 가운데 마스킹
                const idList = matched.map(u => {
                    const id = u.userId || u.email || '-';
                    if (id.length <= 3) return id;
                    const visible = Math.ceil(id.length / 3);
                    return id.slice(0, visible) + '*'.repeat(id.length - visible * 2) + id.slice(-visible);
                });

                document.getElementById('findIdForm').style.display = 'none';
                document.getElementById('resultBox').classList.add('show');
                document.getElementById('resultUserId').innerHTML =
                    idList.map(id => `<div>${id}</div>`).join('');

            } catch (err) {
                console.error('아이디 찾기 오류:', err);
                alert('조회 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
                btn.disabled = false;
                btn.textContent = '아이디 찾기';
            }
        });
    </script>
</body>
</html>
