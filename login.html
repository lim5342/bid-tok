<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 대리입찰 톡</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 2rem;
        }
        
        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 100%;
            padding: 3rem;
        }
        
        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .login-logo i {
            font-size: 3rem;
            color: #1550E8;
            margin-bottom: 0.5rem;
        }
        
        .login-logo h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: #1a1a1a;
            margin: 0;
        }
        
        .login-logo p {
            font-size: 0.95rem;
            color: #666;
            margin-top: 0.5rem;
        }
        
        .login-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            background: #f5f5f5;
            padding: 0.25rem;
            border-radius: 10px;
        }
        
        .login-tab {
            flex: 1;
            padding: 0.75rem;
            border: none;
            background: transparent;
            color: #666;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .login-tab.active {
            background: white;
            color: #1550E8;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .login-form {
            display: none;
        }
        
        .login-form.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 0.5rem;
        }
        
        .form-group input {
            width: 100%;
            padding: 0.875rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #1550E8;
        }
        
        .login-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .remember-me input {
            width: auto;
        }
        
        .remember-me label {
            font-size: 0.9rem;
            color: #666;
            cursor: pointer;
        }
        
        .forgot-password {
            font-size: 0.9rem;
            color: #1550E8;
            text-decoration: none;
        }
        
        .forgot-password:hover {
            text-decoration: underline;
        }
        
        .btn-login {
            width: 100%;
            padding: 1rem;
            background: #1550E8;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-login:hover {
            background: #0d3ba8;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(21, 80, 232, 0.3);
        }
        
        .divider {
            text-align: center;
            margin: 2rem 0;
            color: #999;
            position: relative;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #ddd;
        }
        
        .divider::before {
            left: 0;
        }
        
        .divider::after {
            right: 0;
        }
        
        .signup-link {
            text-align: center;
            margin-top: 1.5rem;
        }
        
        .signup-link a {
            color: #1550E8;
            font-weight: 600;
            text-decoration: none;
        }
        
        .signup-link a:hover {
            text-decoration: underline;
        }
        
        .back-home {
            text-align: center;
            margin-top: 1rem;
        }
        
        .back-home a {
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
        }
        
        .back-home a:hover {
            color: #1550E8;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <i class="fas fa-comment-dots"></i>
                <h1>대리입찰 톡</h1>
                <p>로그인하여 서비스를 이용하세요</p>
            </div>
            
            <div class="login-tabs">
                <button class="login-tab active" data-type="client">신청자</button>
                <button class="login-tab" data-type="expert">법무사</button>
            </div>
            
            <!-- 신청자 로그인 -->
            <form class="login-form active" id="clientLoginForm">
                <div class="form-group">
                    <label for="clientUserId">아이디</label>
                    <input type="text" id="clientUserId" placeholder="아이디를 입력하세요" required>
                </div>
                
                <div class="form-group">
                    <label for="clientPassword">비밀번호</label>
                    <input type="password" id="clientPassword" placeholder="비밀번호를 입력하세요" required>
                </div>
                
                <div class="login-options">
                    <div class="remember-me">
                        <input type="checkbox" id="clientRemember">
                        <label for="clientRemember">자동 로그인</label>
                    </div>
                    <div style="display: flex; gap: 0.5rem;">
                        <a href="find-id.html" class="forgot-password">아이디 찾기</a>
                        <span style="color: #ddd;">|</span>
                        <a href="find-password.html" class="forgot-password">비밀번호 찾기</a>
                    </div>
                </div>
                
                <button type="submit" class="btn-login">로그인</button>
                
                <div style="margin-top: 1.5rem;">
                    <button type="button" onclick="kakaoLogin()" style="width: 100%; padding: 0.9rem; background: #FEE500; color: #000; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-bottom: 0.7rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                        <img src="https://developers.kakao.com/assets/img/about/logos/kakaolink/kakaolink_btn_small.png" style="width: 20px; height: 20px;"> 카카오 로그인
                    </button>
                    <button type="button" onclick="naverLogin()" style="width: 100%; padding: 0.9rem; background: #03C75A; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                        <span style="font-weight: 700; font-size: 1.1rem;">N</span> 네이버 로그인
                    </button>
                </div>
            </form>
            
            <!-- 법무사 로그인 -->
            <form class="login-form" id="expertLoginForm">
                <div class="form-group">
                    <label for="expertUserId">아이디</label>
                    <input type="text" id="expertUserId" placeholder="아이디를 입력하세요" required>
                </div>
                
                <div class="form-group">
                    <label for="expertPassword">비밀번호</label>
                    <input type="password" id="expertPassword" placeholder="비밀번호를 입력하세요" required>
                </div>
                
                <div class="login-options">
                    <div class="remember-me">
                        <input type="checkbox" id="expertRemember">
                        <label for="expertRemember">자동 로그인</label>
                    </div>
                    <div style="display: flex; gap: 0.5rem;">
                        <a href="find-id.html" class="forgot-password">아이디 찾기</a>
                        <span style="color: #ddd;">|</span>
                        <a href="find-password.html" class="forgot-password">비밀번호 찾기</a>
                    </div>
                </div>
                
                <button type="submit" class="btn-login">로그인</button>
                
                <div style="margin-top: 1.5rem;">
                    <button type="button" onclick="kakaoLogin()" style="width: 100%; padding: 0.9rem; background: #FEE500; color: #000; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-bottom: 0.7rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                        <img src="https://developers.kakao.com/assets/img/about/logos/kakaolink/kakaolink_btn_small.png" style="width: 20px; height: 20px;"> 카카오 로그인
                    </button>
                    <button type="button" onclick="naverLogin()" style="width: 100%; padding: 0.9rem; background: #03C75A; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                        <span style="font-weight: 700; font-size: 1.1rem;">N</span> 네이버 로그인
                    </button>
                </div>
            </form>
            
            <div class="divider">또는</div>
            
            <div class="signup-link">
                계정이 없으신가요? <a href="signup.html">회원가입</a>
            </div>
            
            <div class="back-home">
                <a href="index.html"><i class="fas fa-arrow-left"></i> 홈으로 돌아가기</a>
            </div>
        </div>
    </div>
    
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // 탭 전환
        const tabs = document.querySelectorAll('.login-tab');
        const forms = document.querySelectorAll('.login-form');
        
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                // 탭 활성화
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                // 폼 전환
                const type = tab.dataset.type;
                forms.forEach(form => {
                    form.classList.remove('active');
                    if (form.id === `${type}LoginForm`) {
                        form.classList.add('active');
                    }
                });
            });
        });
        
        // 간편 로그인
        function kakaoLogin() {
            alert('카카오 로그인 연동 준비 중입니다.');
            // TODO: 카카오 SDK 연동
        }
        
        function naverLogin() {
            alert('네이버 로그인 연동 준비 중입니다.');
            // TODO: 네이버 SDK 연동
        }
        
        // 신청자 로그인
        document.getElementById('clientLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const userId = document.getElementById('clientUserId').value;
            const password = document.getElementById('clientPassword').value;
            const remember = document.getElementById('clientRemember').checked;
            
            const result = await Auth.login(userId, password, 'client', remember);
            
            if (result.success) {
                // 로그인 성공 알림 없이 바로 이동 (UX 개선)
                window.location.href = 'mypage.html';
            } else {
                alert(result.message || '아이디 또는 비밀번호를 확인해주세요.');
            }
        });
        
        // 법무사 로그인
        document.getElementById('expertLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const userId = document.getElementById('expertUserId').value;
            const password = document.getElementById('expertPassword').value;
            const remember = document.getElementById('expertRemember').checked;
            
            const result = await Auth.login(userId, password, 'expert', remember);
            
            if (result.success) {
                window.location.href = 'expert-mypage.html';
            } else {
                alert(result.message || '아이디 또는 비밀번호를 확인해주세요.');
            }
        });
    </script>
</body>
</html>
