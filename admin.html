<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 페이지 - 대리입찰 톡</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/mypage.css">
</head>
<body>
    <!-- 로그인 화면 -->
    <div id="adminLoginScreen" style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
        <div style="background: white; padding: 3rem; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 100%; max-width: 400px;">
            <h1 style="text-align: center; margin-bottom: 2rem; color: #333;">
                <i class="fas fa-shield-alt"></i> 관리자 로그인
            </h1>
            <form id="adminLoginForm">
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; margin-bottom: 0.5rem; color: #333; font-weight: 600;">아이디</label>
                    <input type="text" id="adminId" required placeholder="bootv1, bootv2, bootv3, bootv4" style="width: 100%; padding: 0.8rem; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1rem;">
                </div>
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; margin-bottom: 0.5rem; color: #333; font-weight: 600;">비밀번호</label>
                    <input type="password" id="adminPassword" required placeholder="비밀번호 입력" style="width: 100%; padding: 0.8rem; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1rem;">
                </div>
                <button type="submit" style="width: 100%; padding: 1rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: 700; cursor: pointer;">로그인</button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem; color: #666; font-size: 0.9rem;">
                bootv1: 대표 (마스터) | bootv2~4: 팀장
            </p>
        </div>
    </div>

    <!-- 관리자 대시보드 -->
    <div id="adminDashboard" style="display: none;">
        <!-- Navigation -->
        <nav class="navbar">
            <div class="container nav-container">
                <div class="nav-logo">
                    <i class="fas fa-shield-alt"></i>
                    <span>관리자 대시보드</span>
                </div>
                <div class="nav-actions">
                    <span id="adminName" style="font-weight: 600; margin-right: 1rem;"></span>
                    <button class="btn btn-outline" onclick="adminLogout()">로그아웃</button>
                </div>
            </div>
        </nav>

        <div class="mypage-container">
            <aside class="mypage-sidebar">
                <div class="sidebar-profile">
                    <div class="profile-avatar">
                        <i class="fas fa-user-shield"></i>
                    </div>
                    <h3 id="adminRoleName">관리자</h3>
                    <p id="adminUserId"></p>
                </div>
                
                <nav class="sidebar-menu">
                    <a href="#dashboard" class="menu-item active" onclick="showAdminSection('dashboard', this)">
                        <i class="fas fa-chart-line"></i> 대시보드
                    </a>
                    <a href="#applications" class="menu-item" onclick="showAdminSection('applications', this)">
                        <i class="fas fa-file-alt"></i> 신청 관리
                    </a>
                    <a href="#experts" class="menu-item" onclick="showAdminSection('experts', this)">
                        <i class="fas fa-user-tie"></i> 전문가 승인
                    </a>
                    <a href="#users" class="menu-item" onclick="showAdminSection('users', this)">
                        <i class="fas fa-users"></i> 회원 관리
                    </a>
                    <a href="#settlements" class="menu-item" onclick="showAdminSection('settlements', this)">
                        <i class="fas fa-won-sign"></i> 정산 관리
                    </a>
                </nav>
            </aside>

            <main class="mypage-content">
                <!-- 대시보드 섹션 -->
                <section id="dashboardSection" class="content-section active">
                    <div class="section-header">
                        <h2><i class="fas fa-chart-line"></i> 대시보드</h2>
                    </div>

                    <div class="stats-grid">
                        <div class="stat-card">
                            <i class="fas fa-file-alt"></i>
                            <div class="stat-value">24</div>
                            <div class="stat-label">전체 신청</div>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-clock"></i>
                            <div class="stat-value">5</div>
                            <div class="stat-label">매칭 대기</div>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-user-tie"></i>
                            <div class="stat-value">12</div>
                            <div class="stat-label">활동 법무사</div>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-won-sign"></i>
                            <div class="stat-value">2,376,000원</div>
                            <div class="stat-label">이번 달 매출</div>
                        </div>
                    </div>

                    <div class="recent-card">
                        <h3>최근 신청 현황</h3>
                        <div class="table-wrap" id="recentApplications"></div>
                    </div>
                </section>

                <!-- 신청 관리 섹션 -->
                <section id="applicationsSection" class="content-section">
                    <div class="section-header">
                        <h2><i class="fas fa-file-alt"></i> 신청 관리</h2>
                        <button class="btn btn-excel" onclick="exportToExcel()">
                            <i class="fas fa-file-excel"></i> 엑셀 다운로드
                        </button>
                    </div>

                    <div class="filter-tabs">
                        <button class="filter-tab active" onclick="filterAdminApplications('all', this)">전체</button>
                        <button class="filter-tab" onclick="filterAdminApplications('matching', this)">매칭중</button>
                        <button class="filter-tab" onclick="filterAdminApplications('confirmed', this)">확정</button>
                        <button class="filter-tab" onclick="filterAdminApplications('completed', this)">완료</button>
                    </div>

                    <div class="table-wrap" id="adminApplicationsList"></div>
                </section>

                <!-- 전문가 승인 섹션 -->
                <section id="expertsSection" class="content-section">
                    <div class="section-header">
                        <h2><i class="fas fa-user-tie"></i> 전문가 승인 대기</h2>
                    </div>

                    <div id="expertApprovalList"></div>
                </section>

                <!-- 회원 관리 섹션 -->
                <section id="usersSection" class="content-section">
                    <div class="section-header">
                        <h2><i class="fas fa-users"></i> 회원 관리</h2>
                    </div>

                    <div style="margin-bottom: 1.5rem;">
                        <input type="text" id="userSearch" placeholder="이름, 이메일, 전화번호로 검색">
                    </div>

                    <div class="table-wrap" id="usersList"></div>
                </section>

                <!-- 정산 관리 섹션 -->
                <section id="settlementsSection" class="content-section">
                    <div class="section-header">
                        <h2><i class="fas fa-won-sign"></i> 정산 관리</h2>
                    </div>

                    <div class="table-wrap" id="settlementsList"></div>
                </section>
            </main>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        let currentAdmin = null;

        // 관리자 로그인
        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const id = document.getElementById('adminId').value;
            const password = document.getElementById('adminPassword').value;
            
            // 임시 인증 (실제로는 서버 인증 필요)
            const validAdmins = {
                'bootv1': { name: '대표 (마스터)', role: 'master', password: '1234' },
                'bootv2': { name: '팀장 2', role: 'team', password: '1234' },
                'bootv3': { name: '팀장 3', role: 'team', password: '1234' },
                'bootv4': { name: '팀장 4', role: 'team', password: '1234' }
            };
            
            if (validAdmins[id] && validAdmins[id].password === password) {
                currentAdmin = { id: id, ...validAdmins[id] };
                
                document.getElementById('adminLoginScreen').style.display = 'none';
                document.getElementById('adminDashboard').style.display = 'block';
                document.getElementById('adminName').textContent = currentAdmin.name;
                document.getElementById('adminRoleName').textContent = currentAdmin.name;
                document.getElementById('adminUserId').textContent = id;
                
                loadDashboard();
            } else {
                alert('아이디 또는 비밀번호가 올바르지 않습니다.');
            }
        });

        // 로그아웃
        function adminLogout() {
            if (confirm('로그아웃 하시겠습니까?')) {
                currentAdmin = null;
                document.getElementById('adminLoginScreen').style.display = 'flex';
                document.getElementById('adminDashboard').style.display = 'none';
                document.getElementById('adminLoginForm').reset();
            }
        }

        // 섹션 전환
        function showAdminSection(section, el) {
            const clickedItem = el ? el.closest('.menu-item') || el : event.currentTarget;
            document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
            if (clickedItem) clickedItem.classList.add('active');
            
            document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
            
            if (section === 'dashboard') {
                document.getElementById('dashboardSection').classList.add('active');
                loadDashboard();
            } else if (section === 'applications') {
                document.getElementById('applicationsSection').classList.add('active');
                loadApplications();
            } else if (section === 'experts') {
                document.getElementById('expertsSection').classList.add('active');
                loadExpertApprovals();
            } else if (section === 'users') {
                document.getElementById('usersSection').classList.add('active');
                loadUsers();
            } else if (section === 'settlements') {
                document.getElementById('settlementsSection').classList.add('active');
                loadSettlements();
            }
        }

        // ── 공통 유틸 ───────────────────────────────────────────
        function formatPrice(price) {
            if (!price) return '0';
            return Number(price).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }

        function getStatusText(status) {
            const map = {
                '접수': '접수', '매칭중': '매칭중', '매칭완료': '확정',
                '진행중': '진행중', '완료': '완료', '낙찰': '낙찰',
                '유찰': '유찰', '취소': '취소',
                'matching': '매칭중', 'confirmed': '확정', 'completed': '완료', 'cancelled': '취소'
            };
            return map[status] || status;
        }

        function getStatusClass(status) {
            const map = {
                '접수': 'status-matching', '매칭중': 'status-matching',
                '매칭완료': 'status-confirmed', '진행중': 'status-confirmed',
                '완료': 'status-completed', '낙찰': 'status-success',
                '유찰': 'status-cancelled', '취소': 'status-cancelled',
                'matching': 'status-matching', 'confirmed': 'status-confirmed',
                'completed': 'status-completed', 'cancelled': 'status-cancelled'
            };
            return map[status] || 'status-matching';
        }

        function setLoading(id) {
            const el = document.getElementById(id);
            if (el) el.innerHTML = '<div style="text-align:center;padding:2rem;color:#999;"><i class="fas fa-spinner fa-spin" style="font-size:2rem;"></i><p style="margin-top:1rem;">불러오는 중...</p></div>';
        }

        // ── 대시보드 로드 (실제 API) ───────────────────────────
        async function loadDashboard() {
            setLoading('recentApplications');
            try {
                const data = await API.applications.getAll('limit=10&sort=-createdAt');
                const apps = (data && data.data) ? data.data : [];

                // 통계 카드 업데이트
                const allData = await API.applications.getAll('limit=1000');
                const all = (allData && allData.data) ? allData.data : [];
                const matching = all.filter(a => a.status === '매칭중' || a.status === '접수');

                // 사용자 수 조회
                let userCount = 0;
                try {
                    const uData = await API.users.getAll('userType=expert&status=active&limit=1000');
                    userCount = (uData && uData.data) ? uData.data.length : 0;
                } catch(e) {}

                // 통계 카드 값 업데이트 (하드코딩 → 실제 값)
                const statValues = document.querySelectorAll('.stat-value');
                if (statValues[0]) statValues[0].textContent = all.length;
                if (statValues[1]) statValues[1].textContent = matching.length;
                if (statValues[2]) statValues[2].textContent = userCount || '-';

                // 이번 달 매출 계산
                const thisMonth = new Date().toISOString().slice(0, 7);
                const thisMonthRevenue = all
                    .filter(a => (a.created_at || '').slice(0, 7) === thisMonth)
                    .reduce((s, a) => s + Number(a.service_fee || 99000), 0);
                if (statValues[3]) statValues[3].textContent = formatPrice(thisMonthRevenue) + '원';

                // 최근 신청 테이블
                const container = document.getElementById('recentApplications');
                if (apps.length === 0) {
                    container.innerHTML = '<div style="text-align:center;padding:2rem;color:#999;">신청 내역이 없습니다.</div>';
                    return;
                }
                container.innerHTML = `
                    <table class="payments-table">
                        <thead>
                            <tr><th>사건번호</th><th>신청자</th><th>담당 법무사</th><th>상태</th><th>신청일</th></tr>
                        </thead>
                        <tbody>
                            ${apps.map(item => `
                                <tr>
                                    <td>${item.case_number || '-'}</td>
                                    <td>${item.applicant_name || '-'}</td>
                                    <td>${item.expert_name || '-'}</td>
                                    <td><span class="status-badge ${getStatusClass(item.status)}">${getStatusText(item.status)}</span></td>
                                    <td>${(item.created_at || '-').slice(0, 10)}</td>
                                </tr>`).join('')}
                        </tbody>
                    </table>`;
            } catch (err) {
                console.error('대시보드 로드 오류:', err);
                document.getElementById('recentApplications').innerHTML =
                    '<div style="text-align:center;padding:2rem;color:#999;">데이터를 불러올 수 없습니다.</div>';
            }
        }

        // ── 신청 관리 로드 (실제 API) ──────────────────────────
        async function loadApplications() {
            const container = document.getElementById('adminApplicationsList');
            setLoading('adminApplicationsList');
            try {
                const data = await API.applications.getAll('limit=200&sort=-createdAt');
                const apps = (data && data.data) ? data.data : [];

                if (apps.length === 0) {
                    container.innerHTML = '<div style="text-align:center;padding:2rem;color:#999;">신청 내역이 없습니다.</div>';
                    return;
                }

                // 전역 앱 목록 저장 (배정 모달에서 사용)
                window._adminApps = apps;

                container.innerHTML = `
                    <table class="payments-table">
                        <thead>
                            <tr>
                                <th>사건번호</th><th>물건지</th><th>신청자</th>
                                <th>연락처</th><th>담당자</th><th>입찰가</th><th>상태</th><th>관리</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${apps.map(item => `
                                <tr data-status="${item.status || ''}">
                                    <td><strong>${item.case_number || '-'}</strong></td>
                                    <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${item.address || item.court || ''}">${item.address || item.court || '-'}</td>
                                    <td>${item.applicant_name || '-'}</td>
                                    <td>${item.phone || '-'}</td>
                                    <td>${item.expert_name
                                        ? `<span style="color:#10B981;font-weight:600;">${item.expert_name}</span>`
                                        : '<span style="color:#999;">미배정</span>'}</td>
                                    <td>${formatPrice(item.bid_amount)}원</td>
                                    <td><span class="status-badge ${getStatusClass(item.status)}">${getStatusText(item.status)}</span></td>
                                    <td style="white-space:nowrap;">
                                        <button class="btn btn-sm btn-outline" onclick="viewApplicationDetail('${item.id}')" style="margin-right:4px;">상세</button>
                                        ${(!item.expert_name && item.status !== '완료' && item.status !== '취소')
                                            ? `<button class="btn btn-sm btn-primary" onclick="openAssignModal('${item.id}')">배정</button>`
                                            : ''}
                                    </td>
                                </tr>`).join('')}
                        </tbody>
                    </table>`;
            } catch (err) {
                console.error('신청 관리 로드 오류:', err);
                container.innerHTML = '<div style="text-align:center;padding:2rem;color:#999;">데이터를 불러올 수 없습니다.</div>';
            }
        }

        // ── 전문가 승인 로드 (실제 API) ────────────────────────
        async function loadExpertApprovals() {
            const container = document.getElementById('expertApprovalList');
            container.innerHTML = '<div style="text-align:center;padding:2rem;color:#999;"><i class="fas fa-spinner fa-spin"></i></div>';
            try {
                const data = await API.users.getAll('userType=expert&status=pending&limit=100');
                const experts = (data && data.data) ? data.data : [];

                if (experts.length === 0) {
                    container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>승인 대기 중인 전문가가 없습니다.</p></div>';
                    return;
                }

                container.innerHTML = experts.map(expert => `
                    <div class="application-card" style="margin-bottom:1.5rem;">
                        <div class="card-header">
                            <div>
                                <span class="case-number">${expert.name || '-'}</span>
                                <span class="status-badge" style="background:#fff3cd;color:#856404;">승인 대기</span>
                            </div>
                            <span style="color:#666;font-size:0.9rem;">신청일: ${(expert.createdAt || '').slice(0,10)}</span>
                        </div>
                        <div class="card-body">
                            <p><strong>이메일:</strong> ${expert.email || '-'}</p>
                            <p><strong>연락처:</strong> ${expert.phone || '-'}</p>
                            <p><strong>등록번호:</strong> ${expert.licenseNumber || '-'}</p>
                            <p><strong>사무소:</strong> ${expert.officeAddress || '-'}</p>
                            <p><strong>서비스 지역:</strong> ${Array.isArray(expert.serviceRegions) ? expert.serviceRegions.join(', ') : (expert.serviceRegions || '-')}</p>
                            <div style="margin-top:1rem;padding:0.8rem;background:#f8f9fa;border-radius:8px;">
                                <p style="margin:0;color:#666;font-size:0.88rem;">📎 첨부 서류: ${expert.licenseFileName || '자격증'}, ${expert.insuranceFileName || '보험증권'}</p>
                            </div>
                        </div>
                        <div class="card-footer">
                            <button class="btn btn-success" onclick="approveExpert('${expert.id}')">
                                <i class="fas fa-check"></i> 승인
                            </button>
                            <button class="btn btn-danger" onclick="rejectExpert('${expert.id}')">
                                <i class="fas fa-times"></i> 거부
                            </button>
                        </div>
                    </div>`).join('');
            } catch (err) {
                console.error('전문가 승인 로드 오류:', err);
                container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>데이터를 불러올 수 없습니다.</p></div>';
            }
        }

        // ── 회원 관리 로드 (실제 API) ──────────────────────────
        async function loadUsers() {
            const container = document.getElementById('usersList');
            container.innerHTML = '<div style="text-align:center;padding:2rem;color:#999;"><i class="fas fa-spinner fa-spin"></i></div>';
            try {
                const data = await API.users.getAll('limit=200&sort=-createdAt');
                const users = (data && data.data) ? data.data : [];

                if (users.length === 0) {
                    container.innerHTML = '<div style="text-align:center;padding:2rem;color:#999;">회원이 없습니다.</div>';
                    return;
                }

                container.innerHTML = `
                    <table class="payments-table">
                        <thead>
                            <tr><th>이름</th><th>아이디</th><th>이메일</th><th>전화번호</th><th>회원유형</th><th>가입일</th><th>관리</th></tr>
                        </thead>
                        <tbody>
                            ${users.map(user => `
                                <tr>
                                    <td><strong>${user.name || '-'}</strong></td>
                                    <td>${user.userId || '-'}</td>
                                    <td>${user.email || '-'}</td>
                                    <td>${user.phone || '-'}</td>
                                    <td><span class="status-badge ${user.userType === 'client' ? 'status-confirmed' : 'status-success'}">${user.userType === 'client' ? '신청자' : '법무사'}</span></td>
                                    <td>${(user.createdAt || '-').slice(0, 10)}</td>
                                    <td><button class="btn btn-sm btn-outline" onclick="viewUserDetail('${user.id}')">상세</button></td>
                                </tr>`).join('')}
                        </tbody>
                    </table>`;

                // 검색 기능 연결
                document.getElementById('userSearch').addEventListener('input', function() {
                    const q = this.value.toLowerCase();
                    document.querySelectorAll('#usersList tbody tr').forEach(row => {
                        row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
                    });
                });
            } catch (err) {
                console.error('회원 관리 로드 오류:', err);
                container.innerHTML = '<div style="text-align:center;padding:2rem;color:#999;">데이터를 불러올 수 없습니다.</div>';
            }
        }

        // ── 정산 관리 로드 (실제 API) ──────────────────────────
        async function loadSettlements() {
            const container = document.getElementById('settlementsList');
            container.innerHTML = '<div style="text-align:center;padding:2rem;color:#999;"><i class="fas fa-spinner fa-spin"></i></div>';
            try {
                // 완료된 신청 건들을 법무사별로 집계
                const data = await API.applications.getAll('status=완료&limit=1000');
                const apps = (data && data.data) ? data.data : [];

                // 법무사별 집계
                const expertMap = {};
                apps.forEach(app => {
                    const eid = app.expert_name || app.expertId || '미지정';
                    const month = (app.completed_at || app.bid_date || '').slice(0, 7);
                    const key = `${eid}__${month}`;
                    if (!expertMap[key]) expertMap[key] = { expertName: eid, month, count: 0, amount: 0 };
                    expertMap[key].count++;
                    expertMap[key].amount += Number(app.service_fee || 99000);
                });

                const rows = Object.values(expertMap).sort((a, b) => b.month.localeCompare(a.month));

                if (rows.length === 0) {
                    container.innerHTML = '<div style="text-align:center;padding:2rem;color:#999;">정산 내역이 없습니다.</div>';
                    return;
                }

                container.innerHTML = `
                    <table class="payments-table">
                        <thead>
                            <tr><th>법무사</th><th>정산월</th><th>처리 건수</th><th>정산 금액</th><th>상태</th><th>관리</th></tr>
                        </thead>
                        <tbody>
                            ${rows.map(item => `
                                <tr>
                                    <td><strong>${item.expertName}</strong></td>
                                    <td>${item.month}</td>
                                    <td>${item.count}건</td>
                                    <td><strong>${formatPrice(item.amount)}원</strong></td>
                                    <td><span class="status-badge status-success">정산완료</span></td>
                                    <td>-</td>
                                </tr>`).join('')}
                        </tbody>
                    </table>`;
            } catch (err) {
                console.error('정산 관리 로드 오류:', err);
                container.innerHTML = '<div style="text-align:center;padding:2rem;color:#999;">데이터를 불러올 수 없습니다.</div>';
            }
        }

        // ── 필터링 ─────────────────────────────────────────────
        function filterAdminApplications(status, el) {
            document.querySelectorAll('.filter-tab').forEach(tab => tab.classList.remove('active'));
            if (el) el.classList.add('active');
            document.querySelectorAll('#adminApplicationsList tbody tr').forEach(row => {
                row.style.display = (status === 'all' || row.dataset.status === status) ? '' : 'none';
            });
        }

        // ── 상세보기 (실제 API) ────────────────────────────────
        async function viewApplicationDetail(id) {
            try {
                const app = await API.applications.getById(id);
                if (!app) { alert('정보를 불러올 수 없습니다.'); return; }
                document.getElementById('adminDetailModal').style.display = 'flex';
                document.getElementById('adminDetailContent').innerHTML = `
                    <table class="detail-table">
                        <tr><td>사건번호</td><td><strong>${app.case_number || '-'}</strong></td></tr>
                        <tr><td>법원</td><td>${app.court || '-'}</td></tr>
                        <tr><td>물건 주소</td><td>${app.address || '-'}</td></tr>
                        <tr><td>신청자</td><td>${app.applicant_name || '-'}</td></tr>
                        <tr><td>연락처</td><td>${app.phone || '-'}</td></tr>
                        <tr><td>감정가</td><td>${formatPrice(app.appraisal_price || 0)}원</td></tr>
                        <tr><td>입찰가</td><td><strong style="color:#1550E8;">${formatPrice(app.bid_amount || 0)}원</strong></td></tr>
                        <tr><td>입찰일</td><td>${app.bid_date || '-'}</td></tr>
                        <tr><td>물건 종류</td><td>${app.property_type || '-'}</td></tr>
                        <tr><td>입찰 형태</td><td>${app.bid_type || '-'}</td></tr>
                        <tr><td>담당 법무사</td><td>${app.expert_name
                            ? `<span style="color:#10B981;font-weight:600;">${app.expert_name}</span>`
                            : '<span style="color:#999;">미배정</span>'}</td></tr>
                        <tr><td>서비스 수수료</td><td>${formatPrice(app.service_fee || 99000)}원</td></tr>
                        <tr><td>결제 상태</td><td>${app.payment_status || '결제대기'}</td></tr>
                        <tr><td>상태</td><td><span class="status-badge ${getStatusClass(app.status)}">${getStatusText(app.status)}</span></td></tr>
                        <tr><td>신청일시</td><td>${app.created_at ? app.created_at.slice(0,16).replace('T',' ') : '-'}</td></tr>
                    </table>`;
            } catch (err) {
                alert('상세 정보를 불러오는 중 오류가 발생했습니다.');
            }
        }

        // ── 전문가 승인/거부 (실제 API) ───────────────────────
        async function approveExpert(id) {
            if (!confirm('이 전문가를 승인하시겠습니까?')) return;
            try {
                await API.users.update(id, { status: 'active', approvedAt: new Date().toISOString() });
                alert('승인되었습니다.');
                loadExpertApprovals();
            } catch (err) {
                alert('처리 중 오류가 발생했습니다.');
            }
        }

        async function rejectExpert(id) {
            if (!confirm('이 전문가 신청을 거부하시겠습니까?')) return;
            const reason = prompt('거부 사유를 입력해주세요:');
            if (!reason) return;
            try {
                await API.users.update(id, { status: 'rejected', rejectedAt: new Date().toISOString(), rejectReason: reason });
                alert('거부되었습니다.');
                loadExpertApprovals();
            } catch (err) {
                alert('처리 중 오류가 발생했습니다.');
            }
        }

        // ── 회원 상세보기 (실제 API) ───────────────────────────
        async function viewUserDetail(id) {
            try {
                const user = await API.users.getById(id);
                if (!user) { alert('정보를 불러올 수 없습니다.'); return; }
                document.getElementById('adminDetailModal').style.display = 'flex';
                document.getElementById('adminDetailContent').innerHTML = `
                    <table class="detail-table">
                        <tr><td>이름</td><td><strong>${user.name || '-'}</strong></td></tr>
                        <tr><td>아이디</td><td>${user.userId || '-'}</td></tr>
                        <tr><td>이메일</td><td>${user.email || '-'}</td></tr>
                        <tr><td>전화번호</td><td>${user.phone || '-'}</td></tr>
                        <tr><td>회원유형</td><td><span class="status-badge ${user.userType === 'client' ? 'status-confirmed' : 'status-success'}">${user.userType === 'client' ? '신청자' : '법무사'}</span></td></tr>
                        <tr><td>상태</td><td>${user.status === 'active' ? '<span style="color:#10B981;font-weight:600;">활성</span>' : user.status || '-'}</td></tr>
                        ${user.userType === 'expert' ? `
                        <tr><td>등록번호</td><td>${user.licenseNumber || '-'}</td></tr>
                        <tr><td>사무소 주소</td><td>${user.officeAddress || '-'}</td></tr>
                        <tr><td>서비스 지역</td><td>${Array.isArray(user.serviceRegions) ? user.serviceRegions.join(', ') : (user.serviceRegions || '-')}</td></tr>
                        ` : ''}
                        <tr><td>가입일</td><td>${(user.createdAt || '-').slice(0, 10)}</td></tr>
                    </table>`;
            } catch (err) {
                alert('정보를 불러오는 중 오류가 발생했습니다.');
            }
        }

        // ── 엑셀 다운로드 ──────────────────────────────────────
        async function exportToExcel() {
            try {
                const data = await API.applications.getAll('limit=1000');
                const apps = (data && data.data) ? data.data : [];
                if (apps.length === 0) { alert('다운로드할 데이터가 없습니다.'); return; }

                const header = ['사건번호', '법원', '신청자', '연락처', '입찰가', '입찰일', '법무사', '상태', '신청일'];
                const rows = apps.map(a => [
                    a.case_number || '', a.court || '', a.applicant_name || '', a.phone || '',
                    a.bid_amount || '', a.bid_date || '', a.expert_name || '',
                    getStatusText(a.status), (a.created_at || '').slice(0, 10)
                ]);

                const csv = '\uFEFF' + [header, ...rows].map(r => r.join(',')).join('\n');
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `신청내역_${new Date().toISOString().slice(0,10)}.csv`;
                a.click();
                URL.revokeObjectURL(url);
            } catch (err) {
                alert('다운로드 중 오류가 발생했습니다.');
            }
        }

        function processSettlement() {
            if (confirm('정산을 처리하시겠습니까?')) {
                alert('정산이 완료되었습니다.');
                loadSettlements();
            }
        }

        // ── 공통 상세보기 모달 닫기 ───────────────────────────
        function closeAdminDetailModal() {
            document.getElementById('adminDetailModal').style.display = 'none';
        }

        // ESC 키로 모달 닫기
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeAdminDetailModal();
                closeAssignModal();
            }
        });

        // ── 법무사 배정 모달 ───────────────────────────────────
        let assignTargetId = null;

        async function openAssignModal(appId) {
            assignTargetId = appId;
            const modal = document.getElementById('assignModal');
            const list  = document.getElementById('assignExpertList');
            modal.style.display = 'flex';
            list.innerHTML = '<div style="text-align:center;padding:1.5rem;color:#999;"><i class="fas fa-spinner fa-spin"></i> 불러오는 중...</div>';

            try {
                const data = await API.users.getAll('userType=expert&status=active&limit=100');
                const experts = (data && data.data) ? data.data : [];

                if (experts.length === 0) {
                    list.innerHTML = '<p style="color:#999;text-align:center;padding:1.5rem;">활성 법무사가 없습니다.</p>';
                    return;
                }
                list.innerHTML = experts.map(ex => `
                    <div class="assign-expert-row" onclick="selectExpert('${ex.id}','${ex.name || ex.userId}')" id="exRow_${ex.id}">
                        <div class="assign-avatar"><i class="fas fa-user-tie"></i></div>
                        <div class="assign-info">
                            <strong>${ex.name || ex.userId}</strong>
                            <span>${ex.phone || ex.email || '-'}</span>
                            <span style="font-size:0.78rem;color:#999;">${Array.isArray(ex.serviceRegions) ? ex.serviceRegions.join(', ') : (ex.serviceRegions || '전국')}</span>
                        </div>
                        <div class="assign-check" id="exCheck_${ex.id}" style="display:none;"><i class="fas fa-check-circle" style="color:#1550E8;font-size:1.3rem;"></i></div>
                    </div>`).join('');
            } catch(e) {
                list.innerHTML = '<p style="color:#e55;text-align:center;padding:1.5rem;">목록 로드 실패</p>';
            }
        }

        let selectedExpertId = null, selectedExpertName = null;

        function selectExpert(id, name) {
            // 이전 선택 해제
            document.querySelectorAll('.assign-expert-row').forEach(r => r.classList.remove('selected'));
            document.querySelectorAll('[id^="exCheck_"]').forEach(c => c.style.display = 'none');
            // 새로 선택
            selectedExpertId = id;
            selectedExpertName = name;
            const row = document.getElementById('exRow_' + id);
            const chk = document.getElementById('exCheck_' + id);
            if (row) row.classList.add('selected');
            if (chk) chk.style.display = 'block';
            document.getElementById('btnConfirmAssign').disabled = false;
        }

        function closeAssignModal() {
            document.getElementById('assignModal').style.display = 'none';
            assignTargetId = null;
            selectedExpertId = null;
            selectedExpertName = null;
        }

        async function confirmAssign() {
            if (!selectedExpertId || !assignTargetId) return;
            const btn = document.getElementById('btnConfirmAssign');
            btn.disabled = true; btn.textContent = '배정 중...';
            try {
                await API.applications.assignExpert(assignTargetId, selectedExpertId, selectedExpertName);
                closeAssignModal();
                alert(`✅ ${selectedExpertName} 법무사에게 배정 완료!`);
                loadApplications();
            } catch(e) {
                alert('배정 중 오류가 발생했습니다.');
                btn.disabled = false; btn.textContent = '배정 확정';
            }
        }
    </script>

    <!-- 공통 상세보기 모달 -->
    <div id="adminDetailModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center; padding:1rem;">
        <div style="background:white; border-radius:20px; width:100%; max-width:520px; max-height:85vh; display:flex; flex-direction:column; box-shadow:0 20px 60px rgba(0,0,0,0.3);">
            <div style="padding:1.5rem 2rem 1rem; border-bottom:1px solid #e0e0e0; display:flex; justify-content:space-between; align-items:center;">
                <h3 style="margin:0; font-size:1.1rem; color:#333;"><i class="fas fa-clipboard-list" style="color:#1550E8; margin-right:0.5rem;"></i>상세 정보</h3>

            </div>
            <div id="adminDetailContent" style="overflow-y:auto; flex:1; padding:1.5rem 2rem;"></div>

                <button onclick="closeAdminDetailModal()" style="width:100%; padding:0.9rem; background:#1550E8; color:white; border:none; border-radius:10px; font-weight:700; cursor:pointer; font-size:0.95rem;">닫기</button>
            </div>
        </div>
    </div>

    <!-- 법무사 배정 모달 -->
    <div id="assignModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center; padding:1rem;">
        <div style="background:white; border-radius:20px; width:100%; max-width:500px; max-height:80vh; display:flex; flex-direction:column; box-shadow:0 20px 60px rgba(0,0,0,0.3);">
            <div style="padding:1.5rem 2rem 1rem; border-bottom:1px solid #e0e0e0; display:flex; justify-content:space-between; align-items:center;">
                <h3 style="margin:0; font-size:1.15rem; color:#333;"><i class="fas fa-user-tie" style="color:#1550E8;margin-right:0.5rem;"></i>법무사 배정</h3>

            <div style="padding:1rem 2rem 1.5rem; border-top:1px solid #e0e0e0; display:flex; gap:0.8rem;">
                <button onclick="closeAssignModal()" style="flex:1; padding:0.9rem; background:white; border:2px solid #e0e0e0; border-radius:10px; font-weight:600; cursor:pointer; color:#666;">취소</button>
                <button id="btnConfirmAssign" onclick="confirmAssign()" disabled style="flex:1; padding:0.9rem; background:#1550E8; color:white; border:none; border-radius:10px; font-weight:700; cursor:pointer; opacity:0.6;">배정 확정</button>
            </div>
        </div>
    </div>
